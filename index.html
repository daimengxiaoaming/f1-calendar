<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYX's F1 Calendar</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="bg-layer"></div>

    <header class="header">
        <h1 class="title">GYX's F1 Calendar</h1>
        <div class="year-selector">
            <button class="year-btn" data-year="2026" aria-label="选择 2026 赛季">2026</button>
        </div>
    </header>

    <main class="main">
        <section class="standings-section" id="standingsSection">
            <div class="standings-header" id="standingsToggle">
                <h2 class="standings-title">车手积分榜</h2>
                <span class="standings-chevron" aria-hidden="true">▾</span>
            </div>
            <div class="standings-body" id="standingsBody">
                <div class="standings-table-wrap" id="standingsTable"></div>
            </div>
        </section>

        <section class="race-list" id="raceList">
            <!-- Race cards rendered by JS -->
        </section>

        <div class="loading" id="loading">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>

        <div class="error-msg" id="errorMsg" hidden>
            <p>数据加载失败，已使用本地赛历</p>
            <button class="retry-btn" id="retryBtn">重试</button>
        </div>
    </main>

    <script src="js/state.js"></script>
    <script src="js/f1api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
