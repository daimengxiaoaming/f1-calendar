<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Red accent stripe (left) -->
  <rect x="0" y="0" width="18" height="512" rx="9" fill="#e10600"/>
  <!-- F1 text -->
  <text x="260" y="280" font-family="-apple-system, sans-serif" font-size="220" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-5">F1</text>
  <!-- Subtitle -->
  <text x="260" y="400" font-family="-apple-system, sans-serif" font-size="52" font-weight="600" fill="#e10600" text-anchor="middle" letter-spacing="15">CALENDAR</text>
  <!-- Checkered flag pattern (bottom) -->
  <g opacity="0.08">
    <rect x="0" y="440" width="64" height="72" fill="#fff"/>
    <rect x="64" y="440" width="64" height="72" fill="none"/>
    <rect x="128" y="440" width="64" height="72" fill="#fff"/>
    <rect x="192" y="440" width="64" height="72" fill="none"/>
    <rect x="256" y="440" width="64" height="72" fill="#fff"/>
    <rect x="320" y="440" width="64" height="72" fill="none"/>
    <rect x="384" y="440" width="64" height="72" fill="#fff"/>
    <rect x="448" y="440" width="64" height="72" fill="none"/>
  </g>
</svg>
